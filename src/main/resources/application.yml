spring:
  application:
    name: flux
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pipeline}
    username: ${DB_USER:pipeline}
    password: ${DB_PASSWORD:pipeline}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    schemas: public
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
  cloud:
    stream:
      bindings:
        listingCreated-out-0:
          destination: listing.created
          content-type: application/json
        enrichListing-in-0:
          destination: listing.created
          group: enrichment-service
          content-type: application/json

pipeline:
  anomaly:
    min-price: 500000
    max-area-sqm: 500
    photos-without-description-threshold: 10
    min-description-length: 30

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html

clickhouse:
  datasource:
    url: ${CH_URL:jdbc:ch://localhost:8123/default}
    username: ${CH_USER:default}
    password: ${CH_PASSWORD:}

app:
  dwh:
    enabled: true
