spring:
  application:
    name: duwniy
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pipeline}
    username: ${DB_USER:pipeline}
    password: ${DB_PASSWORD:pipeline}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    stream:
      bindings:
        listingCreated-out-0:
          destination: listing.created
          content-type: application/json
        enrichListing-in-0:
          destination: listing.created
          group: enrichment-service
          content-type: application/json

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html

clickhouse:
  datasource:
    url: ${CLICKHOUSE_URL:jdbc:ch://localhost:8123/default}
    username: ${CLICKHOUSE_USER:default}
    password: ${CLICKHOUSE_PASSWORD:}
